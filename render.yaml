services:
  - type: web
    name: morning-intel
    runtime: python
    plan: free
    region: singapore
    rootDir: intel_system
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 120 app:app"
    envVars:
      - key: CLAUDE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
